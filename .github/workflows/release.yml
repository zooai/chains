name: Build VM Plugins

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  plan:
    runs-on: zoo-build-linux-amd64
    outputs:
      images: ${{ steps.load.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: echo "images=$(jq -c . .github/images.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.images) }}
    uses: zooai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image.image }}
      dockerfile: Dockerfile.plugin
      runner-amd64: zoo-build-linux-amd64
      runner-arm64: zoo-build-linux-amd64
      runner-deploy: zoo-build-linux-amd64
      platforms: "linux/amd64"
      build-args: |
        VM=${{ matrix.image.vm }}
      pre-build-command: |
        mkdir -p build
        (cd ${{ matrix.image.vm }} && \
         GONOSUMCHECK=github.com/luxfi/* \
         GONOSUMDB=github.com/luxfi/* \
         CGO_ENABLED=${{ matrix.image.cgo }} \
         CGO_CFLAGS="${{ matrix.image.cgo == '1' && '-O2 -D__BLST_PORTABLE__' || '' }}" \
         go build -trimpath -ldflags="-s -w" -o ../build/${{ matrix.image.vm }} .)
    secrets: inherit
